name: Backend CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: Restore with dependency audit
        run: dotnet restore AriansLab.sln /p:NuGetAudit=true /p:NuGetAuditMode=all

      - name: Build
        run: dotnet build AriansLab.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/AriansLab.ApiTests/AriansLab.ApiTests.csproj --no-build --configuration Release --logger "trx;LogFileName=tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/*.trx"
          if-no-files-found: ignore
          retention-days: 7
